<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑洞探测模拟器 - 相对论效应版 (修复光环边界)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: "Microsoft YaHei", sans-serif; }
        
        #ui-container { 
            position: absolute; 
            bottom: 30px; 
            left: 30px; 
            background: rgba(15, 15, 25, 0.85); 
            padding: 25px; 
            border-radius: 16px; 
            border: 1px solid #4a5568; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 15px;
            backdrop-filter: blur(8px);
            width: 340px;
        }

        #narrator-box {
            background: rgba(0, 0, 0, 0.6);
            border-left: 4px solid #9f7aea;
            padding: 12px;
            font-size: 14px;
            line-height: 1.5;
            color: #e2e8f0;
            border-radius: 4px;
            min-height: 65px;
            transition: border-color 0.3s;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        button { 
            padding: 12px 20px; 
            cursor: pointer; 
            color: white; 
            border: none; 
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            background: #e53e3e; 
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(229, 62, 62, 0.4);
        }
        button:hover { background: #c53030; transform: scale(1.02); box-shadow: 0 0 20px rgba(229, 62, 62, 0.7); }
        button:disabled { background: #718096; cursor: not-allowed; box-shadow: none; transform: none; }
        
        input[type=range] { accent-color: #e53e3e; cursor: pointer; }
        
        .tips { font-size: 12px; color: #a0aec0; text-align: center; margin-top: 5px; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <div id="ui-container">
        <button id="launch-btn">🚀 发射宇宙飞船</button>
        
        <div class="control-group">
            <label for="speed-slider" style="font-size: 14px; font-weight: bold;">飞船坠落基础速度: <span id="speed-val" style="color: #fc8181;">1.0</span>x</label>
            <input type="range" id="speed-slider" min="0.1" max="3" step="0.1" value="1.0">
        </div>

        <div id="narrator-box">飞船正在安全轨道上绕行。你可以调节坠落速度，然后点击上方按钮，向黑洞中心进发！</div>
        <div class="tips">操作说明：鼠标左键拖拽旋转视角 🌍，滚轮缩放 🔍</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ==========================================
        // 1. 初始化场景
        // ==========================================
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050011, 0.002);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 40, 140);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxDistance = 400;

        // 星空背景
        const starsGeo = new THREE.BufferGeometry();
        const starsMat = new THREE.PointsMaterial({color: 0xffffff, size: 0.7});
        const starsVertices = [];
        for(let i=0; i<3000; i++) {
            starsVertices.push(THREE.MathUtils.randFloatSpread(1000), THREE.MathUtils.randFloatSpread(1000), THREE.MathUtils.randFloatSpread(1000));
        }
        starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
        scene.add(new THREE.Points(starsGeo, starsMat));

        // ==========================================
        // 2. 创造相对论黑洞
        // ==========================================
        const blackHoleGroup = new THREE.Group();
        scene.add(blackHoleGroup);

        const eventHorizonRadius = 15;

        // A. 事件视界 (绝对黑体)
        const ehGeo = new THREE.SphereGeometry(eventHorizonRadius, 64, 64);
        const ehMat = new THREE.MeshBasicMaterial({ color: 0x000000 }); 
        const eventHorizon = new THREE.Mesh(ehGeo, ehMat);
        blackHoleGroup.add(eventHorizon);

        // B. 光子球 / 边缘发光 (模拟光线弯曲形成的亮环)
        const haloCanvas = document.createElement('canvas');
        haloCanvas.width = 512; haloCanvas.height = 512;
        const hCtx = haloCanvas.getContext('2d');
        const hGrad = hCtx.createRadialGradient(256, 256, eventHorizonRadius * 8, 256, 256, 256);
        hGrad.addColorStop(0, 'rgba(0,0,0,0)'); // 内部遮罩
        hGrad.addColorStop(0.75, 'rgba(255, 200, 100, 0.9)'); // 最亮的光环边界
        hGrad.addColorStop(0.85, 'rgba(255, 100, 30, 0.5)'); // 辐射外晕
        hGrad.addColorStop(1, 'rgba(0,0,0,0)'); // 融于黑暗
        hCtx.fillStyle = hGrad;
        hCtx.fillRect(0, 0, 512, 512);

        const haloTex = new THREE.CanvasTexture(haloCanvas);
        
        // 【关键修复点】：添加了 depthWrite: false，防止透明边界遮挡后方物体
        const haloMat = new THREE.SpriteMaterial({ 
            map: haloTex, 
            color: 0xffffff, 
            blending: THREE.AdditiveBlending, 
            transparent: true,
            depthWrite: false 
        });
        const halo = new THREE.Sprite(haloMat);
        halo.scale.set(eventHorizonRadius * 3.8, eventHorizonRadius * 3.8, 1);
        blackHoleGroup.add(halo);

        // C. 吸积盘
        function createAccretionDiskTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            const centerX = 256, centerY = 256;
            const gradient = ctx.createRadialGradient(centerX, centerY, 50, centerX, centerY, 250);
            
            gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
            gradient.addColorStop(0.2, 'rgba(255, 255, 255, 0.8)'); 
            gradient.addColorStop(0.4, 'rgba(255, 150, 50, 0.6)'); 
            gradient.addColorStop(0.8, 'rgba(200, 50, 20, 0.2)'); 
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 512, 512);
            
            for(let i=0; i<400; i++) {
                ctx.beginPath();
                const r = 70 + Math.random() * 160;
                const theta = Math.random() * Math.PI * 2;
                ctx.arc(centerX + Math.cos(theta)*r, centerY + Math.sin(theta)*r, Math.random()*2.5, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(255,220,150,0.6)';
                ctx.fill();
            }
            return new THREE.CanvasTexture(canvas);
        }

        const diskGeo = new THREE.PlaneGeometry(130, 130);
        
        // 【关键修复点】：添加了 depthWrite: false
        const diskMat = new THREE.MeshBasicMaterial({ 
            map: createAccretionDiskTexture(), 
            side: THREE.DoubleSide, 
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false 
        });
        const disk = new THREE.Mesh(diskGeo, diskMat);
        disk.rotation.x = Math.PI / 2.1; 
        blackHoleGroup.add(disk);

        const bhLight = new THREE.PointLight(0xffaa66, 3, 200);
        scene.add(bhLight);

        // ==========================================
        // 3. 创造宇宙飞船
        // ==========================================
        const shipGroup = new THREE.Group();
        
        const bodyGeo = new THREE.CylinderGeometry(1, 1.5, 6, 16);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.9, roughness: 0.1 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.rotation.x = Math.PI / 2;
        shipGroup.add(body);

        const noseGeo = new THREE.ConeGeometry(1, 3, 16);
        const noseMat = new THREE.MeshStandardMaterial({ color: 0xdd3333 });
        const nose = new THREE.Mesh(noseGeo, noseMat);
        nose.position.z = 4.5;
        nose.rotation.x = Math.PI / 2;
        shipGroup.add(nose);

        const engineGeo = new THREE.SphereGeometry(0.8, 16, 16);
        const engineMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
        const engine = new THREE.Mesh(engineGeo, engineMat);
        engine.position.z = -3;
        shipGroup.add(engine);

        scene.add(shipGroup);
        scene.add(new THREE.AmbientLight(0x222233));

        // ==========================================
        // 4. 动画与相对论动力学控制
        // ==========================================
        let shipState = 'orbiting'; 
        let orbitAngle = 0;
        let shipDistance = 110; 
        
        let baseFallSpeed = 1.0; 

        const launchBtn = document.getElementById('launch-btn');
        const narratorBox = document.getElementById('narrator-box');
        const speedSlider = document.getElementById('speed-slider');
        const speedVal = document.getElementById('speed-val');

        speedSlider.addEventListener('input', (e) => {
            baseFallSpeed = parseFloat(e.target.value);
            speedVal.innerText = baseFallSpeed.toFixed(1);
        });

        launchBtn.addEventListener('click', () => {
            shipState = 'falling';
            launchBtn.disabled = true;
            speedSlider.disabled = true; 
            narratorBox.innerHTML = "⚠️ 警告！飞船正在向黑洞坠落！";
            narratorBox.style.borderLeftColor = "#e53e3e";
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);

            disk.rotation.z -= 0.005;
            halo.material.opacity = 0.8 + Math.sin(Date.now() * 0.003) * 0.2;

            if (shipState === 'orbiting') {
                orbitAngle += 0.008;
                shipGroup.position.x = Math.cos(orbitAngle) * shipDistance;
                shipGroup.position.z = Math.sin(orbitAngle) * shipDistance;
                shipGroup.position.y = Math.sin(orbitAngle * 2) * 8; 
                
                const nextX = Math.cos(orbitAngle + 0.1) * shipDistance;
                const nextZ = Math.sin(orbitAngle + 0.1) * shipDistance;
                const nextY = Math.sin((orbitAngle + 0.1) * 2) * 8;
                shipGroup.lookAt(nextX, nextY, nextZ);

            } else if (shipState === 'falling') {
                shipGroup.lookAt(0, 0, 0); 
                
                let distanceToHorizon = shipDistance - eventHorizonRadius;
                
                let timeDilationFactor = Math.max(0.005, distanceToHorizon / 40); 
                let currentPullSpeed = baseFallSpeed * timeDilationFactor;
                
                shipGroup.translateZ(currentPullSpeed); 
                shipDistance = shipGroup.position.length();

                if (distanceToHorizon < 20 && distanceToHorizon > 10) {
                    narratorBox.innerHTML = "⏳ 【时间膨胀】：对于外界观察者来说，飞船的时间流逝变得极其缓慢，它的坠落看起来像被按下了慢放键...";
                    narratorBox.style.borderLeftColor = "#3182ce";
                }

                if (distanceToHorizon < 15 && distanceToHorizon > 0) {
                    const stretchFactor = 1 + (15 - distanceToHorizon) * 0.6; 
                    const thinFactor = Math.max(0.05, 1 - (15 - distanceToHorizon) * 0.06);  
                    
                    shipGroup.scale.set(thinFactor, thinFactor, stretchFactor);
                    
                    if (distanceToHorizon < 10) {
                        narratorBox.innerHTML = "🚨 【面条化】：黑洞极端的引力差正在将飞船拉长，就像拉面条一样！";
                        narratorBox.style.borderLeftColor = "#dd6b20";
                    }
                }

                if (shipDistance <= eventHorizonRadius + 0.1) {
                    shipState = 'consumed';
                    shipGroup.visible = false; 
                    
                    const flash = document.createElement('div');
                    flash.style.position = 'absolute';
                    flash.style.top = 0; flash.style.left = 0;
                    flash.style.width = '100%'; flash.style.height = '100%';
                    flash.style.backgroundColor = 'white';
                    flash.style.zIndex = 999;
                    flash.style.transition = 'opacity 0.5s';
                    document.body.appendChild(flash);
                    
                    setTimeout(() => { flash.style.opacity = 0; }, 50);
                    setTimeout(() => { document.body.removeChild(flash); }, 550);

                    narratorBox.innerHTML = "🌌 飞船已穿过【事件视界】。它永远留在了那个连光都无法逃脱的空间中。";
                    narratorBox.style.borderLeftColor = "#718096";
                    
                    setTimeout(() => {
                        shipState = 'orbiting';
                        shipDistance = 110;
                        shipGroup.scale.set(1, 1, 1);
                        shipGroup.visible = true;
                        launchBtn.disabled = false;
                        speedSlider.disabled = false;
                        narratorBox.innerHTML = "探测任务重置。飞船已重新部署在安全轨道上。";
                        narratorBox.style.borderLeftColor = "#9f7aea";
                    }, 6000);
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
